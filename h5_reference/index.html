<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电子书阅读器</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- 欢迎界面 -->
        <div id="welcome-screen" class="screen active">
            <div class="welcome-content">
                <h1>📚 电子书阅读器</h1>
                <p>上传您的小说文件，开始阅读之旅</p>
                
                <div class="upload-section">
                    <div class="upload-box">
                        <label for="book-upload" class="upload-label">
                            <span class="upload-icon">📖</span>
                            <span>上传小说文件 (.txt)</span>
                        </label>
                        <input type="file" id="book-upload" accept=".txt" hidden>
                    </div>
                    
                    <div class="upload-box">
                        <label for="music-upload" class="upload-label">
                            <span class="upload-icon">🎵</span>
                            <span>上传背景音乐 (可选)</span>
                        </label>
                        <input type="file" id="music-upload" accept="audio/*" hidden>
                    </div>
                </div>
                
                <button id="start-reading" class="btn-primary" disabled>开始阅读</button>
            </div>
        </div>

        <!-- 阅读界面 -->
        <div id="reader-screen" class="screen">
            <!-- 顶部工具栏 -->
            <header class="reader-header">
                <button id="toggle-toc" class="btn-icon" title="目录">📑</button>
                <span id="book-title">未命名书籍</span>
                <button id="toggle-settings" class="btn-icon" title="设置">⚙️</button>
            </header>

            <!-- 目录侧边栏 -->
            <aside id="toc-sidebar" class="sidebar">
                <div class="sidebar-header">
                    <h3>📑 目录</h3>
                    <button id="close-toc" class="btn-close">✕</button>
                </div>
                <div id="toc-list" class="toc-list"></div>
            </aside>

            <!-- 设置侧边栏 -->
            <aside id="settings-sidebar" class="sidebar">
                <div class="sidebar-header">
                    <h3>⚙️ 阅读设置</h3>
                    <button id="close-settings" class="btn-close">✕</button>
                </div>
                <div class="settings-content">
                    <!-- 主题设置 -->
                    <div class="setting-group">
                        <label>主题模式</label>
                        <div class="theme-options">
                            <button class="theme-btn active" data-theme="light">☀️ 白天</button>
                            <button class="theme-btn" data-theme="dark">🌙 夜间</button>
                            <button class="theme-btn" data-theme="sepia">📜 羊皮纸</button>
                        </div>
                    </div>

                    <!-- 字体大小 -->
                    <div class="setting-group">
                        <label>字体大小: <span id="font-size-value">18</span>px</label>
                        <input type="range" id="font-size-slider" min="12" max="32" value="18">
                    </div>

                    <!-- 背景音乐 -->
                    <div class="setting-group">
                        <label>背景音乐</label>
                        <div class="music-controls">
                            <button id="toggle-music" class="btn-music">▶️ 播放</button>
                            <label>音量: <span id="volume-value">50</span>%</label>
                            <input type="range" id="volume-slider" min="0" max="100" value="50">
                        </div>
                    </div>

                    <!-- 清除数据 -->
                    <div class="setting-group">
                        <button id="clear-data" class="btn-danger">🗑️ 清除所有数据</button>
                    </div>
                </div>
            </aside>

            <!-- 阅读内容区域 -->
            <main class="reader-content">
                <div id="chapter-title" class="chapter-title"></div>
                <div id="content-area" class="content-area"></div>
            </main>

            <!-- 底部导航栏 -->
            <footer class="reader-footer">
                <button id="prev-page" class="btn-nav">◀ 上一页</button>
                <span id="page-info" class="page-info">第 1 页 / 共 1 页</span>
                <button id="next-page" class="btn-nav">下一页 ▶</button>
            </footer>

            <!-- 进度条 -->
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
        </div>

        <!-- 音频播放器 -->
        <audio id="bgm-player" loop></audio>
    </div>

    <script src="app.js"></script>
</body>
</html>
